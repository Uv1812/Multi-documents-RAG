services:
  - type: web
    name: lumina-rag
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install torch --index-url https://download.pytorch.org/whl/cpu --no-cache-dir && pip install -r requirements.txt --no-cache-dir
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GROQ_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
